<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghana Customer Service Index Survey 2024</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="survey-card" aria-live="polite">

            <div>

          <div id="progressBar" class="progress-bar" aria-label="Survey progress"></div>

        <div id="surveyContent" class="survey-content"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
